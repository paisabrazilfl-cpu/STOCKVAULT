openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Motion Scanner v3.0 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: chart
    description: OHLCV chart data
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat and agent operations
  - name: scan
    description: Scanner engine
  - name: watchlists
    description: Ticker watchlists
  - name: config
    description: Tenant scan configuration
  - name: broker
    description: Alpaca broker integration
  - name: sector
    description: Sector rotation
  - name: audit
    description: Audit logs
  - name: apikeys
    description: Tenant API key management
paths:
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── SCAN ─────────────────────────────────────────────────────────────────
  /scan:
    post:
      operationId: runScan
      tags: [scan]
      summary: Run a scan on a list of tickers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"

  /scan/history:
    get:
      operationId: listScanHistory
      tags: [scan]
      summary: List past scan runs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Scan history list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanHistoryList"

  /scan/history/{id}:
    get:
      operationId: getScanHistory
      tags: [scan]
      summary: Get a specific scan result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanHistoryItem"
        "404":
          description: Not found

  # ── WATCHLISTS ────────────────────────────────────────────────────────────
  /watchlists:
    get:
      operationId: listWatchlists
      tags: [watchlists]
      summary: List all watchlists for tenant
      responses:
        "200":
          description: Watchlist array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Watchlist"
    post:
      operationId: createWatchlist
      tags: [watchlists]
      summary: Create a watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistInput"
      responses:
        "201":
          description: Created watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watchlist"

  /watchlists/{id}:
    get:
      operationId: getWatchlist
      tags: [watchlists]
      summary: Get a watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watchlist"
        "404":
          description: Not found
    put:
      operationId: updateWatchlist
      tags: [watchlists]
      summary: Update a watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistInput"
      responses:
        "200":
          description: Updated watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Watchlist"
    delete:
      operationId: deleteWatchlist
      tags: [watchlists]
      summary: Delete a watchlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── CONFIG ────────────────────────────────────────────────────────────────
  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get tenant scan configuration
      responses:
        "200":
          description: Scan configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanConfig"
    put:
      operationId: updateConfig
      tags: [config]
      summary: Update tenant scan configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanConfigInput"
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanConfig"

  # ── BROKER ────────────────────────────────────────────────────────────────
  /broker/account:
    get:
      operationId: getBrokerAccount
      tags: [broker]
      summary: Get Alpaca account status
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerAccount"
        "503":
          description: Broker not configured

  /broker/execute:
    post:
      operationId: executeTrades
      tags: [broker]
      summary: Execute bracket orders for GO candidates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteRequest"
      responses:
        "200":
          description: Execution results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExecutionResult"

  /broker/positions:
    get:
      operationId: getBrokerPositions
      tags: [broker]
      summary: Get open Alpaca positions
      responses:
        "200":
          description: Open positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  # ── BROKER API (per-user brokerage accounts) ──────────────────────────────
  /broker/accounts/me:
    get:
      operationId: getMyBrokerAccount
      tags: [broker]
      summary: Get the signed-in user's brokerage account (Broker API)
      responses:
        "200":
          description: The user's brokerage account, or a not-onboarded marker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageAccount"
        "503":
          description: Broker API not configured on the server

  /broker/accounts:
    post:
      operationId: createBrokerAccount
      tags: [broker]
      summary: Submit a KYC application to open a brokerage account for the user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerAccountApplication"
      responses:
        "200":
          description: Created brokerage account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerageAccount"
        "400":
          description: Invalid application
        "409":
          description: User already has a brokerage account
        "503":
          description: Broker API not configured on the server

  /broker/accounts/me/positions:
    get:
      operationId: getMyBrokerPositions
      tags: [broker]
      summary: Open positions for the user's brokerage account
      responses:
        "200":
          description: Open positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  /broker/accounts/me/orders:
    get:
      operationId: getMyBrokerOrders
      tags: [broker]
      summary: Orders for the user's brokerage account
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [open, closed, all], default: all }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrokerOrder"
    post:
      operationId: createMyBrokerOrder
      tags: [broker]
      summary: Place an order in the user's brokerage account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrokerOrder"
      responses:
        "200":
          description: Submitted order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrokerOrder"
        "400":
          description: Invalid order
        "404":
          description: User has no brokerage account
        "503":
          description: Broker API not configured on the server

  /broker/accounts/me/fund:
    post:
      operationId: fundMyBrokerAccount
      tags: [broker]
      summary: Instantly fund the user's brokerage account (sandbox only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FundAccount"
      responses:
        "200":
          description: Transfer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundResult"
        "400":
          description: Funding not allowed (e.g. live environment)
        "404":
          description: User has no brokerage account
        "503":
          description: Broker API not configured on the server

  /broker/accounts/me/portfolio:
    get:
      operationId: getMyBrokerPortfolioHistory
      tags: [broker]
      summary: Portfolio equity / P&L history for the user's brokerage account
      parameters:
        - name: period
          in: query
          schema: { type: string, default: "1M" }
        - name: timeframe
          in: query
          schema: { type: string, default: "1D" }
      responses:
        "200":
          description: Portfolio history time series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioHistory"

  # ── SECTOR ────────────────────────────────────────────────────────────────
  /sector-rotation:
    get:
      operationId: getSectorRotation
      tags: [sector]
      summary: Get sector rotation heatmap data
      responses:
        "200":
          description: Sector rotation data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectorRotation"

  # ── SCREENER ───────────────────────────────────────────────────────────────
  /screener:
    get:
      operationId: runScreener
      tags: [scan]
      summary: Reverse screener — find stocks matching filter parameters from the S&P 100 universe
      parameters:
        - name: priceMin
          in: query
          schema: { type: number, default: 1 }
        - name: priceMax
          in: query
          schema: { type: number, default: 10000 }
        - name: rsiMin
          in: query
          schema: { type: number, default: 0 }
        - name: rsiMax
          in: query
          schema: { type: number, default: 100 }
        - name: adxMin
          in: query
          schema: { type: number, default: 0 }
        - name: rvolMin
          in: query
          schema: { type: number, default: 0 }
        - name: scoreMin
          in: query
          schema: { type: number, default: 0 }
        - name: verdictFilter
          in: query
          schema: { type: string, enum: [all, go, go_hold], default: all }
        - name: aboveEma10
          in: query
          schema: { type: boolean }
        - name: aboveSma20
          in: query
          schema: { type: boolean }
        - name: emaStackRequired
          in: query
          schema: { type: boolean }
        - name: stochMin
          in: query
          schema: { type: number }
        - name: stochMax
          in: query
          schema: { type: number }
        - name: macd3mAboveZero
          in: query
          schema: { type: boolean }
        - name: macd3mHistPositive
          in: query
          schema: { type: boolean }
        - name: breakoutOnly
          in: query
          schema: { type: boolean }
        # ── Alex's Screener rules (optional; filter only when provided) ──────
        - name: range52wMin
          in: query
          description: 52-week high / low multiple, e.g. 2 = "2x range"
          schema: { type: number }
        - name: mom1mMin
          in: query
          description: Minimum trailing ~1-month momentum as a fraction, e.g. 0.20 = +20%
          schema: { type: number }
        - name: nearHigh52wPct
          in: query
          description: Must trade within this fraction of the 52-week high, e.g. 0.10 = within 10%
          schema: { type: number }
        - name: universe
          in: query
          schema: { type: string, enum: [sp100, nasdaq100, dow30, tech, finance, health, energy, consumer, industrials, utilities, materials, realestate, comms, semis, biotech, smallcap, mags7, aicloud, dividend, all], default: sp100 }
        - name: bust
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Screener results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreenerResult"

  # ── NOTES ─────────────────────────────────────────────────────────────────
  /notes:
    get:
      operationId: getNotes
      tags: [notes]
      summary: List all notes for the current tenant
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a new note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    put:
      operationId: updateNote
      tags: [notes]
      summary: Update a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── NEWS ──────────────────────────────────────────────────────────────────
  /news:
    get:
      operationId: getNews
      tags: [scan]
      summary: Tier-1 financial news feed (global + USA)
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [general, forex, merger, all]
            default: all
      responses:
        "200":
          description: News articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsFeed"

  # ── CHART ─────────────────────────────────────────────────────────────────
  /chart/{ticker}:
    get:
      operationId: getChart
      tags: [scan]
      summary: OHLCV candle data for a ticker
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
        - name: range
          in: query
          schema:
            type: string
            enum: [1mo, 3mo, 6mo, 1y, 2y]
            default: 3mo
        - name: interval
          in: query
          schema:
            type: string
            enum: [1d, 1wk]
            default: 1d
      responses:
        "200":
          description: OHLCV candle data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChartData"

  # ── AUDIT LOGS ────────────────────────────────────────────────────────────
  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List SOC 2 audit events for tenant
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit log list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogList"

  # ── API KEYS ──────────────────────────────────────────────────────────────
  /api-keys:
    get:
      operationId: getApiKeys
      tags: [apikeys]
      summary: Get masked API keys for tenant
      responses:
        "200":
          description: Masked key info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyStatus"
    put:
      operationId: updateApiKeys
      tags: [apikeys]
      summary: Store or update encrypted API keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyStatus"

  # ── DASHBOARD SUMMARIES (wow endpoints) ───────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [scan]
      summary: Dashboard summary — recent scan stats + regime
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── SCAN ─────────────────────────────────────────────────────────────
    ScanRequest:
      type: object
      required: [tickers]
      properties:
        tickers:
          type: array
          items:
            type: string
        watchlistId:
          type: ["integer", "null"]
        configOverride:
          type: ["object", "null"]
          additionalProperties: true
        computeOptions:
          type: boolean
          default: true
        computeSectors:
          type: boolean
          default: true

    CandidateRecord:
      type: object
      required: [ticker, verdict, score]
      properties:
        ticker:
          type: string
        verdict:
          type: string
          enum: [GO, HOLD, ABORT]
        score:
          type: number
        reason:
          type: string
        technical:
          type: ["object", "null"]
          additionalProperties: true
        fundamentals:
          type: ["object", "null"]
          additionalProperties: true
        flow:
          type: ["object", "null"]
          additionalProperties: true
        monteCarlo:
          type: ["object", "null"]
          additionalProperties: true
        indicators:
          type: ["object", "null"]
          additionalProperties: true
        optionsFlow:
          type: ["object", "null"]
          additionalProperties: true
        options:
          type: ["object", "null"]
          additionalProperties: true
        sentiment:
          type: ["object", "null"]
          additionalProperties: true
        sectorContext:
          type: ["object", "null"]
          additionalProperties: true

    ScanResult:
      type: object
      required: [id, timestamp, candidates, hold, rejected]
      properties:
        id:
          type: integer
        timestamp:
          type: string
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateRecord"
        hold:
          type: array
          items:
            $ref: "#/components/schemas/CandidateRecord"
        rejected:
          type: array
          items:
            $ref: "#/components/schemas/CandidateRecord"
        sectorRotation:
          type: ["object", "null"]
          additionalProperties: true
        activeProviders:
          type: array
          items:
            type: string

    ScanHistoryItem:
      type: object
      required: [id, createdAt, tickerCount, goCount, holdCount, rejectCount]
      properties:
        id:
          type: integer
        createdAt:
          type: string
        tickerCount:
          type: integer
        goCount:
          type: integer
        holdCount:
          type: integer
        rejectCount:
          type: integer
        regime:
          type: ["string", "null"]
        payload:
          type: ["object", "null"]
          additionalProperties: true

    ScanHistoryList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScanHistoryItem"
        total:
          type: integer

    # ── WATCHLIST ─────────────────────────────────────────────────────────
    Watchlist:
      type: object
      required: [id, name, tickers, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        tickers:
          type: array
          items:
            type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    WatchlistInput:
      type: object
      required: [name, tickers]
      properties:
        name:
          type: string
          minLength: 1
        tickers:
          type: array
          items:
            type: string
        description:
          type: ["string", "null"]

    # ── CONFIG ────────────────────────────────────────────────────────────
    ScanConfig:
      type: object
      required: [id, config]
      properties:
        id:
          type: integer
        config:
          type: object
          additionalProperties: true
        updatedAt:
          type: string

    ScanConfigInput:
      type: object
      required: [config]
      properties:
        config:
          type: object
          additionalProperties: true

    # ── BROKER ────────────────────────────────────────────────────────────
    BrokerAccount:
      type: object
      required: [equity, buyingPower, cash, portfolioValue, paper]
      properties:
        equity:
          type: number
        lastEquity:
          type: number
        buyingPower:
          type: number
        cash:
          type: number
        portfolioValue:
          type: number
        paper:
          type: boolean
        dayPl:
          type: ["number", "null"]
        dayPlPct:
          type: ["number", "null"]

    ExecuteRequest:
      type: object
      required: [candidates]
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateRecord"
        dryRun:
          type: boolean
          default: true
        configOverride:
          type: ["object", "null"]
          additionalProperties: true

    ExecutionResult:
      type: object
      required: [ok, ticker]
      properties:
        ok:
          type: boolean
        ticker:
          type: string
        orderId:
          type: ["string", "null"]
        qty:
          type: integer
        entry:
          type: number
        target:
          type: number
        stop:
          type: number
        reason:
          type: string

    Position:
      type: object
      required: [symbol, qty, marketValue, unrealizedPl]
      properties:
        symbol:
          type: string
        qty:
          type: number
        marketValue:
          type: number
        unrealizedPl:
          type: number
        unrealizedPlPct:
          type: number
        currentPrice:
          type: number
        entryPrice:
          type: number

    # ── SECTOR ────────────────────────────────────────────────────────────
    SectorEntry:
      type: object
      required: [etf, name, ret1d, ret5d, ret20d, rs1d, rs5d, rs20d, leader, laggard]
      properties:
        etf:
          type: string
        name:
          type: string
        ret1d:
          type: number
        ret5d:
          type: number
        ret20d:
          type: number
        rs1d:
          type: number
        rs5d:
          type: number
        rs20d:
          type: number
        leader:
          type: boolean
        laggard:
          type: boolean

    SectorRotation:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
        regime:
          type: ["string", "null"]
        cyclicalRs:
          type: ["number", "null"]
        defensiveRs:
          type: ["number", "null"]
        sectors:
          type: array
          items:
            $ref: "#/components/schemas/SectorEntry"
        leaders:
          type: array
          items:
            $ref: "#/components/schemas/SectorEntry"
        laggards:
          type: array
          items:
            $ref: "#/components/schemas/SectorEntry"
        spyReturns:
          type: ["object", "null"]
          additionalProperties: true

    # ── AUDIT LOGS ────────────────────────────────────────────────────────
    AuditLogEntry:
      type: object
      required: [id, action, createdAt]
      properties:
        id:
          type: integer
        action:
          type: string
        resourceType:
          type: ["string", "null"]
        resourceId:
          type: ["string", "null"]
        userId:
          type: ["string", "null"]
        ipAddress:
          type: ["string", "null"]
        metadata:
          type: ["object", "null"]
          additionalProperties: true
        createdAt:
          type: string

    AuditLogList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        total:
          type: integer

    # ── BROKER API (per-user brokerage accounts) ──────────────────────────
    BrokerageAccount:
      type: object
      required: [onboarded, brokerEnabled]
      properties:
        onboarded:
          type: boolean
          description: True when the user has a brokerage account on file.
        brokerEnabled:
          type: boolean
          description: True when the server has Broker API credentials configured.
        accountId:
          type: ["string", "null"]
        accountNumber:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
          description: SUBMITTED, ACTION_REQUIRED, ACTIVE, REJECTED, etc.
        cryptoStatus:
          type: ["string", "null"]
        currency:
          type: ["string", "null"]
        equity:
          type: ["number", "null"]
        cash:
          type: ["number", "null"]
        buyingPower:
          type: ["number", "null"]
        portfolioValue:
          type: ["number", "null"]

    BrokerAccountApplication:
      type: object
      required: [contact, identity, disclosures, agreedToCustomerAgreement]
      properties:
        contact:
          type: object
          required: [emailAddress, phoneNumber, streetAddress, city, state, postalCode]
          properties:
            emailAddress: { type: string }
            phoneNumber: { type: string }
            streetAddress:
              type: array
              items: { type: string }
            city: { type: string }
            state: { type: string }
            postalCode: { type: string }
        identity:
          type: object
          required:
            [givenName, familyName, dateOfBirth, taxId, countryOfCitizenship, countryOfBirth, countryOfTaxResidence]
          properties:
            givenName: { type: string }
            familyName: { type: string }
            dateOfBirth: { type: string, description: "YYYY-MM-DD" }
            taxId: { type: string }
            taxIdType: { type: string, default: "USA_SSN" }
            countryOfCitizenship: { type: string, default: "USA" }
            countryOfBirth: { type: string, default: "USA" }
            countryOfTaxResidence: { type: string, default: "USA" }
            fundingSource:
              type: array
              items: { type: string }
        disclosures:
          type: object
          properties:
            isControlPerson: { type: boolean, default: false }
            isAffiliatedExchangeOrFinra: { type: boolean, default: false }
            isPoliticallyExposed: { type: boolean, default: false }
            immediateFamilyExposed: { type: boolean, default: false }
        agreedToCustomerAgreement:
          type: boolean
          description: Must be true; the server records the signed customer agreement.

    BrokerOrder:
      type: object
      required: [id, symbol, side, status]
      properties:
        id: { type: string }
        clientOrderId: { type: ["string", "null"] }
        symbol: { type: string }
        side: { type: string }
        type: { type: ["string", "null"] }
        timeInForce: { type: ["string", "null"] }
        qty: { type: ["number", "null"] }
        filledQty: { type: ["number", "null"] }
        filledAvgPrice: { type: ["number", "null"] }
        limitPrice: { type: ["number", "null"] }
        stopPrice: { type: ["number", "null"] }
        status: { type: string }
        submittedAt: { type: ["string", "null"] }
        filledAt: { type: ["string", "null"] }

    CreateBrokerOrder:
      type: object
      required: [symbol, side]
      properties:
        symbol: { type: string }
        qty: { type: ["number", "null"] }
        notional: { type: ["number", "null"] }
        side: { type: string, enum: [buy, sell] }
        type: { type: string, enum: [market, limit, stop, stop_limit], default: market }
        timeInForce: { type: string, enum: [day, gtc, ioc, fok], default: day }
        limitPrice: { type: ["number", "null"] }
        stopPrice: { type: ["number", "null"] }

    FundAccount:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          description: Virtual USD amount to deposit (sandbox).
          default: 100000

    FundResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        transferId: { type: ["string", "null"] }
        amount: { type: ["number", "null"] }
        status: { type: ["string", "null"] }

    PortfolioHistory:
      type: object
      properties:
        timestamp:
          type: array
          items: { type: number }
        equity:
          type: array
          items: { type: ["number", "null"] }
        profitLoss:
          type: array
          items: { type: ["number", "null"] }
        profitLossPct:
          type: array
          items: { type: ["number", "null"] }
        baseValue: { type: ["number", "null"] }
        timeframe: { type: ["string", "null"] }

    # ── API KEYS ──────────────────────────────────────────────────────────
    ApiKeyStatus:
      type: object
      properties:
        alpacaConfigured:
          type: boolean
        alpacaManaged:
          type: boolean
          description: >-
            True when Alpaca credentials are provided server-side via
            environment (the operator's account). When set, per-tenant Alpaca
            keys are ignored and the Settings inputs are read-only.
        alpacaBrokerConfigured:
          type: boolean
          description: True when Broker API credentials (key + secret) are on file.
        alpacaBrokerManaged:
          type: boolean
          description: >-
            True when Broker API credentials come from server env. When set, the
            Settings inputs are read-only.
        alpacaBrokerSandbox:
          type: boolean
          description: True when the Broker API targets the sandbox environment.
        tradierConfigured:
          type: boolean
        polygonConfigured:
          type: boolean
        finnhubConfigured:
          type: boolean
        discordConfigured:
          type: boolean
        alpacaPaper:
          type: boolean

    ApiKeyInput:
      type: object
      properties:
        alpacaApiKey:
          type: ["string", "null"]
        alpacaSecretKey:
          type: ["string", "null"]
        alpacaPaper:
          type: ["boolean", "null"]
        alpacaBrokerApiKey:
          type: ["string", "null"]
        alpacaBrokerSecretKey:
          type: ["string", "null"]
        alpacaBrokerSandbox:
          type: ["boolean", "null"]
        tradierApiKey:
          type: ["string", "null"]
        polygonApiKey:
          type: ["string", "null"]
        finnhubApiKey:
          type: ["string", "null"]
        discordWebhookUrl:
          type: ["string", "null"]


    ScreenerResult:
      type: object
      required: [results, total, scanned, cachedAt]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/CandidateRecord"
        total:
          type: integer
        scanned:
          type: integer
        cachedAt:
          type: string
    # ── NOTES ─────────────────────────────────────────────────────────────
    Note:
      type: object
      required: [id, tenantId, title, content, createdAt, updatedAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    NoteInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: string

    # ── NEWS ──────────────────────────────────────────────────────────────
    NewsArticle:
      type: object
      required: [id, headline, summary, source, sourceLabel, url, publishedAt, relatedTickers, category, sentiment, isBreaking]
      properties:
        id:
          type: string
        headline:
          type: string
        summary:
          type: string
        source:
          type: string
        sourceLabel:
          type: string
        url:
          type: string
        image:
          type: ["string", "null"]
        publishedAt:
          type: string
        relatedTickers:
          type: array
          items:
            type: string
        category:
          type: string
        sentiment:
          type: string
          enum: [bullish, bearish, neutral]
        isBreaking:
          type: boolean

    NewsFeed:
      type: object
      required: [articles, source, category]
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
        source:
          type: string
        category:
          type: string

    # ── CHART ─────────────────────────────────────────────────────────────
    Candle:
      type: object
      required: [time, open, high, low, close, volume]
      properties:
        time:
          type: integer
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number

    ChartData:
      type: object
      required: [ticker, range, candles]
      properties:
        ticker:
          type: string
        range:
          type: string
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"

    # ── OPENAI ────────────────────────────────────────────────────────────
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, title, createdAt]
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, conversationId, role, content, createdAt]
    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required: [title]
    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required: [content]
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required: [id, title, createdAt, messages]
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ── DASHBOARD ─────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalScans, avgGoCount, avgScore, lastRegime, lastScanAt]
      properties:
        totalScans:
          type: integer
        avgGoCount:
          type: number
        avgScore:
          type: number
        lastRegime:
          type: ["string", "null"]
        lastScanAt:
          type: ["string", "null"]
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ScanHistoryItem"
        topTickers:
          type: array
          items:
            type: object
            required: [ticker, goCount, avgScore]
            properties:
              ticker:
                type: string
              goCount:
                type: integer
              avgScore:
                type: number
