# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  STOCKVAULT — Render Blueprint (one-click deploy)                       ║
# ║                                                                         ║
# ║  HOW TO DEPLOY (one time, ~2 minutes):                                  ║
# ║  1. Go to https://dashboard.render.com                                  ║
# ║  2. Click "New +" → "Blueprint"                                         ║
# ║  3. Pick the STOCKVAULT repo, branch: main                              ║
# ║  4. Render auto-detects this file and creates all 3 services + DB       ║
# ║  5. It will prompt you for the "sync: false" secrets (Alpaca keys etc.) ║
# ║     — leave them blank to skip, fill in later from the dashboard.       ║
# ║  6. Click "Apply" → done.                                               ║
# ║                                                                         ║
# ║  If you already have a manually-created API service, DELETE it first    ║
# ║  (it's broken anyway) — the Blueprint creates a fresh working one.      ║
# ║                                                                         ║
# ║  Docs: https://render.com/docs/blueprint-spec                          ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

databases:
  - name: stockvault-db
    plan: free
    databaseName: stockvault
    user: stockvault

services:
  # ── API server (Express) ───────────────────────────────────────────────────
  - type: web
    name: stockvault-api
    runtime: node
    plan: free
    repo: https://github.com/paisabrazilfl-cpu/stockvault
    branch: main
    rootDir: .
    # db push runs at START (non-fatal) not in the build: a transient DB issue
    # must not fail the whole build and leave the service with no running server.
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @workspace/api-server run build
    startCommand: timeout 30 corepack pnpm --filter @workspace/db run push || true; corepack pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "22.22.2"
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stockvault-db
          property: connectionString
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: APCA_API_KEY_ID
        sync: false
      - key: APCA_API_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: ALPACA_BROKER_API_KEY
        sync: false
      - key: ALPACA_BROKER_API_SECRET
        sync: false
      - key: ALPACA_BROKER_SANDBOX
        value: "true"
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ── AI agent backend (OpenAI-compatible) ──────────────────────────────
      # Defaults to NVIDIA NIM serving DeepSeek V4 Pro. The API key is a secret —
      # paste your nvapi-… key in the Render dashboard (never commit it).
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: AI_MODEL
        value: deepseek-ai/deepseek-v4-pro
      # Reasoning/thinking mode for DeepSeek-on-NIM (default off = faster SSE).
      - key: AI_THINKING
        value: "false"
      # ── Ticker reference search (Polygon or Massive — identical API) ───────
      # Symbol search uses /v3/reference/tickers. Defaults to Polygon's host;
      # set TICKERS_BASE_URL=https://api.massive.com to use Massive instead.
      # The key falls back to each tenant's stored Polygon key when unset.
      - key: TICKERS_BASE_URL
        value: https://api.polygon.io
      - key: POLYGON_API_KEY
        sync: false

  # ── Frontend (Vite static site) ────────────────────────────────────────────
  - type: web
    name: stockvault-web
    runtime: static
    repo: https://github.com/paisabrazilfl-cpu/stockvault
    branch: main
    rootDir: .
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm --filter @workspace/motion-scanner run build
    staticPublishPath: artifacts/motion-scanner/dist/public
    envVars:
      - key: NODE_VERSION
        value: "22.22.2"
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0"
      # Real Clerk publishable key (pk_test_… / pk_live_…). Set this to enable
      # per-user sign-in. Leave it blank to run the app in single-tenant mode.
      # Vite inlines it at BUILD time, so a change requires a redeploy.
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      # Where the frontend sends /api requests. "/" = same-origin: requests go
      # to THIS static site and the /api/* rewrite below proxies them to the
      # API service. NEVER bake a hardcoded API host here — when that service
      # is renamed/deleted the whole app bricks ("API server is unreachable").
      #
      # NOTE: the stockvault-api service serves this same frontend itself, so
      # the simplest setup is to use the API service's URL as the app URL and
      # ignore this static site entirely.
      - key: VITE_API_BASE_URL
        value: "/"
    routes:
      # Proxy API calls to the API service. AFTER the Blueprint deploy, check
      # the actual URL of stockvault-api in the Render dashboard and update
      # this destination if it differs (Render may add a suffix to new URLs).
      - type: rewrite
        source: /api/*
        destination: https://stockvault-api.onrender.com/api/*
      # SPA fallback — every non-API route serves the React app.
      - type: rewrite
        source: /*
        destination: /index.html
